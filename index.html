<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufar Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="aset/style.css">
</head>

<body class="bg-[#0a0a0a]">

    <div id="navbar"></div>

    <div id="hero"></div>

    <div id="about"></div>
    <div id="skills"></div>
    <div id="footer"></div>

    <script>
        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                if (!res.ok) throw new Error(`Gagal memuat ${file}`);
                const content = await res.text();
                const target = document.getElementById(id);
                if (target) {
                    target.innerHTML = content;
                }
            } catch (err) {
                console.error(err);
            }
        }

        loadComponent('navbar', 'componen/navbar.html');
        loadComponent('hero', 'componen/hero.html');
        loadComponent('about', 'componen/about.html');
        loadComponent('skills', 'componen/skills.html');
        loadComponent('footer', 'componen/footer.html');
    </script>
</body>
