<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufar Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="aset/style.css">
</head>

<body class="bg-[#0a0a0a]">

    <div id="hero"></div>
    <div id="skills"></div>
    <div id="footer"></div>

    <script>
        // Script sederhana untuk memuat file html lain
        async function loadComponent(id, file) {
            const res = await fetch(file);
            const content = await res.text();
            document.getElementById(id).innerHTML = content;
        }

        loadComponent('navbar', 'componen/navbar.html');
        loadComponent('hero', 'componen/hero.html');
        loadComponent('about', 'componen/about.html');
        loadComponent('skills', 'componen/skills.html');
        loadComponent('footer', 'componen/footer.html');
    </script>
</body>

</html>
